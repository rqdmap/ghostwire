name: Collect AW Snapshot

on:
  workflow_dispatch:
    inputs:
      host_id:
        description: 'Host config ID (matches [host_meta.X] in aw-report.toml)'
        required: true
        default: 'work-mac'
      date:
        description: 'Date to collect (YYYY-MM-DD, default: today)'
        required: false
        default: ''
  schedule:
    - cron: '30 2 * * *'   # 10:30 AM CST daily

jobs:
  collect:
    name: Collect ${{ github.event.inputs.host_id || 'work-mac' }} snapshot
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}

      - name: Install aw-report
        run: pip install -e . --quiet

      - name: Collect snapshot
        env:
          HOST_ID: ${{ github.event.inputs.host_id || 'work-mac' }}
          SNAP_DATE: ${{ github.event.inputs.date || '' }}
        run: |
          DATE_ARG=""
          if [ -n "$SNAP_DATE" ]; then
            DATE_ARG="--date $SNAP_DATE"
          fi
          aw-report snapshot day --host "$HOST_ID" $DATE_ARG \
            --out "/tmp/snapshot-${HOST_ID}-$(date +%Y-%m-%d).json"

      - name: Push snapshot to private snapshots repo
        env:
          SNAPSHOTS_REPO: ${{ secrets.SNAPSHOTS_REPO }}
          SNAPSHOTS_DEPLOY_KEY: ${{ secrets.SNAPSHOTS_DEPLOY_KEY }}
        run: |
          # Setup SSH for private repo access
          mkdir -p ~/.ssh
          echo "$SNAPSHOTS_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git clone "git@github.com:${SNAPSHOTS_REPO}.git" /tmp/snapshots-repo
          cp /tmp/snapshot-*.json /tmp/snapshots-repo/
          cd /tmp/snapshots-repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "snapshot: $(date +%Y-%m-%d) ${HOST_ID}" --allow-empty
          git push

          rm ~/.ssh/deploy_key
