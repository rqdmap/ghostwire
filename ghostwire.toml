[general]
timezone = "Asia/Shanghai"

[activitywatch]
base_url = "http://127.0.0.1:5600"
timeout_seconds = 30
hosts = ["auto"]

[upload]
# server_url = "https://telemetry.example.com"

[categorize.terminal]
allow = ["Alacritty", "iTerm2", "kitty", "Neovim", "Code", "WezTerm", "Terminal", "Hyper"]

[categorize.browser]
allow = ["Google Chrome", "Chromium", "Firefox", "Safari", "Arc", "Brave Browser"]

[host_meta.work-mac]
label = "工作机"
platform = "macOS"

[host_meta.home-arch]
label = "家里机"
platform = "Arch Linux"
