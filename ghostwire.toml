[general]
timezone = "Asia/Shanghai"
day_start = "06:00"

[activitywatch]
base_url = "http://127.0.0.1:5600"
timeout_seconds = 30
hosts = ["auto"]

[upload]
# server_url = "https://telemetry.example.com"

[categorize.terminal]
allow = [
  # macOS / Linux
  "Alacritty", "iTerm2", "kitty", "Neovim", "Code", "WezTerm", "Terminal", "Hyper",
  # Windows
  "Windows Terminal", "pwsh.exe", "powershell.exe", "cmd.exe",
]

[categorize.browser]
allow = [
  # macOS / Linux
  "Google Chrome", "Google-chrome", "Chromium", "Firefox", "Safari", "Arc", "Brave Browser",
  # Windows
  "Microsoft Edge", "msedge.exe", "chrome.exe", "firefox.exe",
]

[host_meta.work-mac]
label = "Work"
platform = "macOS"

[host_meta.home-arch]
label = "Home"
platform = "Arch Linux"

[host_meta.home-win]
label = "Home"
platform = "Windows"
